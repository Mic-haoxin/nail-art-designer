<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>💅 美甲款式设计器 - Nail Art Studio</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #1a0a1e 0%, #2d1536 50%, #1a0a2e 100%);
  min-height: 100vh;
  color: #e8d5f5;
  overflow-x: hidden;
}
.header {
  text-align: center;
  padding: 20px 16px 12px;
}
.header h1 {
  font-size: 2em;
  background: linear-gradient(135deg, #f7a8d8, #c471ed, #8b5cf6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  font-weight: 800;
  letter-spacing: 2px;
}
.header p { color: #9b7fb5; font-size: 0.9em; margin-top: 4px; }

.container {
  display: flex;
  gap: 20px;
  padding: 0 20px 30px;
  max-width: 1200px;
  margin: 0 auto;
  align-items: flex-start;
}

/* Canvas Panel */
.canvas-panel {
  flex: 1;
  min-width: 0;
  background: rgba(255,255,255,0.04);
  border-radius: 24px;
  padding: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
}
canvas {
  border-radius: 16px;
  max-width: 100%;
  height: auto;
  touch-action: manipulation;
}

/* Controls Panel */
.controls {
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  flex-shrink: 0;
}

.section {
  background: rgba(255,255,255,0.04);
  border-radius: 16px;
  padding: 16px;
  border: 1px solid rgba(255,255,255,0.06);
}
.section-title {
  font-size: 0.8em;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: #9b7fb5;
  margin-bottom: 12px;
  font-weight: 600;
}

/* Nail selector */
.nail-tabs {
  display: flex;
  gap: 8px;
}
.nail-tab {
  flex: 1;
  padding: 8px 4px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  background: transparent;
  color: #9b7fb5;
  cursor: pointer;
  font-size: 0.75em;
  text-align: center;
  transition: all 0.2s;
  font-family: inherit;
}
.nail-tab:hover { border-color: rgba(200,150,255,0.4); color: #d4b8f0; }
.nail-tab.active {
  background: linear-gradient(135deg, rgba(196,113,237,0.3), rgba(139,92,246,0.3));
  border-color: #c471ed;
  color: #fff;
  font-weight: 600;
}

/* Shape selector */
.shape-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.shape-btn {
  padding: 6px 12px;
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  background: transparent;
  color: #c4b0e0;
  cursor: pointer;
  font-size: 0.78em;
  transition: all 0.2s;
  font-family: inherit;
}
.shape-btn:hover { border-color: rgba(200,150,255,0.4); }
.shape-btn.active {
  background: rgba(139,92,246,0.3);
  border-color: #8b5cf6;
  color: #fff;
}

/* Color picker */
.color-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 12px;
}
.color-dot {
  width: 28px; height: 28px;
  border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
}
.color-dot:hover { transform: scale(1.15); }
.color-dot.active { border-color: #fff; box-shadow: 0 0 12px currentColor; }
.color-input-wrap {
  position: relative;
  width: 32px; height: 32px;
  border-radius: 50%;
  overflow: hidden;
  border: 2px dashed rgba(255,255,255,0.2);
  flex-shrink: 0;
}
.color-input-wrap input[type=color] {
  position: absolute;
  top: -8px; left: -8px;
  width: 48px; height: 48px;
  border: none; cursor: pointer;
  background: transparent;
}

/* Style selector */
.style-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.style-btn {
  padding: 10px 8px;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px;
  background: rgba(255,255,255,0.03);
  color: #c4b0e0;
  cursor: pointer;
  font-size: 0.78em;
  text-align: center;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.style-btn:hover { border-color: rgba(200,150,255,0.4); background: rgba(255,255,255,0.06); }
.style-btn.active {
  background: rgba(139,92,246,0.25);
  border-color: #8b5cf6;
  color: #fff;
}
.style-btn .icon { font-size: 1.2em; }

/* Deco grid */
.deco-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.deco-btn {
  padding: 8px 14px;
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 20px;
  background: rgba(255,255,255,0.03);
  color: #c4b0e0;
  cursor: pointer;
  font-size: 0.78em;
  transition: all 0.2s;
  font-family: inherit;
}
.deco-btn:hover { border-color: rgba(200,150,255,0.4); }
.deco-btn.active {
  background: rgba(139,92,246,0.25);
  border-color: #8b5cf6;
  color: #fff;
}

/* Actions */
.action-row {
  display: flex;
  gap: 10px;
}
.btn {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 14px;
  cursor: pointer;
  font-size: 0.9em;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #c471ed, #8b5cf6);
  color: #fff;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(139,92,246,0.4); }
.btn-secondary {
  background: rgba(255,255,255,0.06);
  color: #c4b0e0;
  border: 1px solid rgba(255,255,255,0.1);
}
.btn-secondary:hover { background: rgba(255,255,255,0.1); }
.btn-outline {
  flex: 0.4;
  background: transparent;
  color: #f7a8d8;
  border: 1.5px solid rgba(247,168,216,0.3);
  font-size: 0.8em;
}
.btn-outline:hover { border-color: #f7a8d8; background: rgba(247,168,216,0.08); }

/* Responsive */
@media (max-width: 800px) {
  .container { 
    flex-direction: column; 
    padding: 0 12px 20px;
  }
  .canvas-panel { 
    min-width: auto;
    padding: 8px;
  }
  .controls { width: 100%; }
  .header h1 { font-size: 1.4em; }
  .header { padding: 12px 12px 8px; }
  .section { padding: 12px; }
  .shape-btn { padding: 5px 10px; font-size: 0.72em; }
  .style-btn { padding: 8px 6px; font-size: 0.72em; }
  .color-dot { width: 24px; height: 24px; }
}
</style>
</head>
<body>

<div class="header">
  <h1>💅 Nail Art Studio</h1>
  <p>美甲款式设计器 · 点击指甲开始设计</p>
</div>

<div class="container">
  <div class="canvas-panel">
    <canvas id="nailCanvas"></canvas>
  </div>

  <div class="controls">
    <!-- Nail Selector -->
    <div class="section">
      <div class="section-title">📌 选择指甲</div>
      <div class="nail-tabs" id="nailTabs">
        <button class="nail-tab active" data-nail="0">👍 拇指</button>
        <button class="nail-tab" data-nail="1">☝️ 食指</button>
        <button class="nail-tab" data-nail="2">🖕 中指</button>
        <button class="nail-tab" data-nail="3">💍 无名指</button>
        <button class="nail-tab" data-nail="4">🤙 小指</button>
      </div>
    </div>

    <!-- Shape -->
    <div class="section">
      <div class="section-title">✂️ 甲型</div>
      <div class="shape-grid" id="shapeGrid">
        <button class="shape-btn active" data-shape="square">方形</button>
        <button class="shape-btn" data-shape="round">圆形</button>
        <button class="shape-btn" data-shape="almond">杏仁</button>
        <button class="shape-btn" data-shape="stiletto">尖形</button>
        <button class="shape-btn" data-shape="coffin">芭蕾</button>
      </div>
    </div>

    <!-- Color -->
    <div class="section">
      <div class="section-title">🎨 颜色</div>
      <div class="color-row" id="colorPresets">
        <span class="color-dot active" data-color="#f7a8d8" style="background:#f7a8d8;color:#f7a8d8"></span>
        <span class="color-dot" data-color="#ff6b6b" style="background:#ff6b6b;color:#ff6b6b"></span>
        <span class="color-dot" data-color="#ff8787" style="background:#ff8787;color:#ff8787"></span>
        <span class="color-dot" data-color="#ffd43b" style="background:#ffd43b;color:#ffd43b"></span>
        <span class="color-dot" data-color="#69db7c" style="background:#69db7c;color:#69db7c"></span>
        <span class="color-dot" data-color="#74c0fc" style="background:#74c0fc;color:#74c0fc"></span>
        <span class="color-dot" data-color="#8b5cf6" style="background:#8b5cf6;color:#8b5cf6"></span>
        <span class="color-dot" data-color="#e599f7" style="background:#e599f7;color:#e599f7"></span>
        <span class="color-dot" data-color="#212121" style="background:#212121;color:#212121"></span>
        <span class="color-dot" data-color="#ffffff" style="background:#ffffff;color:#ffffff"></span>
        <div class="color-input-wrap">
          <input type="color" id="customColor" value="#f7a8d8">
        </div>
      </div>
    </div>

    <!-- Style -->
    <div class="section">
      <div class="section-title">✨ 款式</div>
      <div class="style-grid" id="styleGrid">
        <button class="style-btn active" data-style="solid"><span class="icon">🎨</span> 纯色</button>
        <button class="style-btn" data-style="french"><span class="icon">🤍</span> 法式</button>
        <button class="style-btn" data-style="ombre"><span class="icon">🌈</span> 渐变</button>
        <button class="style-btn" data-style="glitter"><span class="icon">✨</span> 闪粉</button>
      </div>
    </div>

    <!-- Decorations -->
    <div class="section">
      <div class="section-title">💎 装饰</div>
      <div class="deco-grid" id="decoGrid">
        <button class="deco-btn active" data-deco="none">无</button>
        <button class="deco-btn" data-deco="rhinestone">💎 水钻</button>
        <button class="deco-btn" data-deco="dots">🔵 波点</button>
        <button class="deco-btn" data-deco="heart">❤️ 爱心</button>
        <button class="deco-btn" data-deco="star">⭐ 星星</button>
        <button class="deco-btn" data-deco="stripe">📐 条纹</button>
      </div>
    </div>

    <!-- Actions -->
    <div class="action-row">
      <button class="btn btn-outline" id="copyAll">📋 应用到全部</button>
      <button class="btn btn-secondary" id="resetBtn">🔄 重置</button>
      <button class="btn btn-primary" id="saveBtn">💾 保存图片</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('nailCanvas');
const ctx = canvas.getContext('2d');

// State
let selectedNail = 0;
let selectedShape = 'square';
let selectedColor = '#f7a8d8';
let selectedStyle = 'solid';
let selectedDeco = 'none';

const NAMES = ['拇指', '食指', '中指', '无名指', '小指'];

const nails = Array.from({length: 5}, (_, i) => ({
  shape: 'square',
  color: '#f7a8d8',
  style: 'solid',
  deco: i === 3 ? 'rhinestone' : 'none',
  secondColor: '#ffffff'
}));

// Nail geometry for each finger
function getNailGeom(i, hand, scale) {
  const { cx, cy } = hand;
  // Finger base positions (where nail cuticle is)
  const baseX = [
    cx - 110 * scale,  // thumb
    cx - 55 * scale,   // index
    cx,                // middle
    cx + 55 * scale,   // ring
    cx + 100 * scale   // pinky
  ];
  const baseY = [
    cy + 45 * scale,   // thumb
    cy + 50 * scale,   // index
    cy + 55 * scale,   // middle
    cy + 45 * scale,   // ring
    cy + 30 * scale    // pinky
  ];
  const tipY = [
    cy - 75 * scale,   // thumb
    cy - 95 * scale,   // index
    cy - 105 * scale,  // middle
    cy - 90 * scale,   // ring
    cy - 70 * scale    // pinky
  ];
  const nw = [
    28 * scale,  // thumb
    24 * scale,  // index
    25 * scale,  // middle
    22 * scale,  // ring
    18 * scale   // pinky
  ];
  const angle = [
    -15 * Math.PI / 180, // thumb angled
    0, 0, 0, 8 * Math.PI / 180
  ];
  return {
    bx: baseX[i], by: baseY[i],
    ty: tipY[i], w: nw[i],
    angle: angle[i],
    length: Math.abs(tipY[i] - baseY[i])
  };
}

function drawNailPath(g, shape) {
  const { bx, by, ty, w, angle, length } = g;
  ctx.save();
  ctx.translate(bx, by);
  ctx.rotate(angle);
  ctx.beginPath();
  
  const hw = w / 2;
  // Cuticle (bottom) - slightly curved
  ctx.moveTo(-hw, 0);
  ctx.quadraticCurveTo(0, -w * 0.12, hw, 0);
  
  const tipY = -(length);
  
  switch (shape) {
    case 'square':
      ctx.lineTo(hw, tipY + 3);
      ctx.lineTo(hw - 1, tipY);
      ctx.lineTo(-hw + 1, tipY);
      ctx.lineTo(-hw, tipY + 3);
      break;
    case 'round':
      ctx.lineTo(hw, tipY + hw * 0.6);
      ctx.quadraticCurveTo(hw, tipY, 0, tipY);
      ctx.quadraticCurveTo(-hw, tipY, -hw, tipY + hw * 0.6);
      break;
    case 'almond':
      ctx.lineTo(hw * 0.7, tipY + length * 0.25);
      ctx.quadraticCurveTo(hw * 0.35, tipY + 4, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.35, tipY + 4, -hw * 0.7, tipY + length * 0.25);
      break;
    case 'stiletto':
      ctx.lineTo(hw * 0.5, tipY + length * 0.4);
      ctx.quadraticCurveTo(hw * 0.15, tipY + 2, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.15, tipY + 2, -hw * 0.5, tipY + length * 0.4);
      break;
    case 'coffin':
      ctx.lineTo(hw * 0.6, tipY + 8);
      ctx.lineTo(hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.6, tipY + 8);
      break;
  }
  
  ctx.closePath();
  ctx.restore();
}

function drawHand(scale, w, h) {
  // Dynamically center the hand in the canvas
  const cx = w / 2, cy = h * 0.52;
  
  // Draw palm + fingers silhouette
  ctx.save();
  ctx.fillStyle = '#f5d5c8';
  ctx.strokeStyle = '#e8c4b5';
  ctx.lineWidth = 2;
  
  // Simplified hand path
  ctx.beginPath();
  // Thumb (left)
  ctx.moveTo(cx - 130 * scale, cy + 60 * scale);
  ctx.lineTo(cx - 120 * scale, cy - 80 * scale);
  ctx.lineTo(cx - 90 * scale, cy - 80 * scale);
  ctx.lineTo(cx - 85 * scale, cy + 30 * scale);
  // Index
  ctx.lineTo(cx - 70 * scale, cy - 100 * scale);
  ctx.lineTo(cx - 40 * scale, cy - 100 * scale);
  ctx.lineTo(cx - 45 * scale, cy + 20 * scale);
  // Middle
  ctx.lineTo(cx - 15 * scale, cy - 110 * scale);
  ctx.lineTo(cx + 15 * scale, cy - 110 * scale);
  ctx.lineTo(cx + 5 * scale, cy + 25 * scale);
  // Ring
  ctx.lineTo(cx + 35 * scale, cy - 95 * scale);
  ctx.lineTo(cx + 65 * scale, cy - 95 * scale);
  ctx.lineTo(cx + 55 * scale, cy + 15 * scale);
  // Pinky
  ctx.lineTo(cx + 85 * scale, cy - 75 * scale);
  ctx.lineTo(cx + 115 * scale, cy - 75 * scale);
  ctx.lineTo(cx + 100 * scale, cy);
  // Right side of palm
  ctx.lineTo(cx + 110 * scale, cy + 80 * scale);
  ctx.lineTo(cx + 90 * scale, cy + 100 * scale);
  ctx.lineTo(cx - 90 * scale, cy + 100 * scale);
  ctx.lineTo(cx - 130 * scale, cy + 80 * scale);
  ctx.closePath();
  
  ctx.fill();
  ctx.stroke();
  
  // Wrist
  ctx.beginPath();
  ctx.moveTo(cx - 90 * scale, cy + 100 * scale);
  ctx.lineTo(cx - 70 * scale, cy + 150 * scale);
  ctx.lineTo(cx + 70 * scale, cy + 150 * scale);
  ctx.lineTo(cx + 90 * scale, cy + 100 * scale);
  ctx.fill();
  ctx.stroke();
  
  // Knuckle lines
  ctx.strokeStyle = '#e8c4b5';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const g = getNailGeom(i, {cx, cy}, scale);
    ctx.save();
    ctx.translate(g.bx, g.by);
    ctx.rotate(g.angle);
    ctx.beginPath();
    ctx.moveTo(-g.w * 0.6, 0);
    ctx.lineTo(g.w * 0.6, 0);
    ctx.stroke();
    ctx.restore();
  }
  
  ctx.restore();
  
  return { cx, cy };
}

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const a = s * Math.min(l, 1 - l);
  const f = n => {
    const k = (n + h / 30) % 12;
    const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color);
  };
  return [f(0), f(8), f(4)];
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

function drawNail(idx, hand, scale) {
  const nail = nails[idx];
  const g = getNailGeom(idx, hand, scale);
  const [r, gv, b] = hexToRgb(nail.color);
  const [r2, g2, b2] = hexToRgb(nail.secondColor);
  
  ctx.save();
  ctx.translate(g.bx, g.by);
  ctx.rotate(g.angle);
  
  const hw = g.w / 2;
  const tipY = -g.length;
  
  // Clip to nail shape
  ctx.save();
  ctx.beginPath();
  // Cuticle curve
  ctx.moveTo(-hw, 0);
  ctx.quadraticCurveTo(0, -g.w * 0.12, hw, 0);
  
  switch (nail.shape) {
    case 'square':
      ctx.lineTo(hw, tipY + 3);
      ctx.lineTo(hw - 1, tipY);
      ctx.lineTo(-hw + 1, tipY);
      ctx.lineTo(-hw, tipY + 3);
      break;
    case 'round':
      ctx.lineTo(hw, tipY + hw * 0.6);
      ctx.quadraticCurveTo(hw, tipY, 0, tipY);
      ctx.quadraticCurveTo(-hw, tipY, -hw, tipY + hw * 0.6);
      break;
    case 'almond':
      ctx.lineTo(hw * 0.7, tipY + g.length * 0.25);
      ctx.quadraticCurveTo(hw * 0.35, tipY + 4, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.35, tipY + 4, -hw * 0.7, tipY + g.length * 0.25);
      break;
    case 'stiletto':
      ctx.lineTo(hw * 0.5, tipY + g.length * 0.4);
      ctx.quadraticCurveTo(hw * 0.15, tipY + 2, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.15, tipY + 2, -hw * 0.5, tipY + g.length * 0.4);
      break;
    case 'coffin':
      ctx.lineTo(hw * 0.6, tipY + 8);
      ctx.lineTo(hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.6, tipY + 8);
      break;
  }
  ctx.closePath();
  ctx.clip();
  
  switch (nail.style) {
    case 'solid':
      ctx.fillStyle = nail.color;
      ctx.fillRect(-hw * 2, tipY - 10, g.w * 4, g.length + 20);
      break;
      
    case 'french':
      // Base
      ctx.fillStyle = 'rgba(255,220,230,0.9)';
      ctx.fillRect(-hw * 2, tipY - 10, g.w * 4, g.length + 20);
      // French tip
      ctx.fillStyle = nail.color;
      const frenchH = g.length * 0.4;
      ctx.beginPath();
      ctx.moveTo(-hw, tipY + frenchH);
      ctx.quadraticCurveTo(0, tipY + frenchH - g.w * 0.15, hw, tipY + frenchH);
      ctx.lineTo(hw, tipY - 10);
      ctx.lineTo(-hw, tipY - 10);
      ctx.closePath();
      ctx.fill();
      // Smile line
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-hw, tipY + frenchH);
      ctx.quadraticCurveTo(0, tipY + frenchH - g.w * 0.15, hw, tipY + frenchH);
      ctx.stroke();
      break;
      
    case 'ombre':
      const grad = ctx.createLinearGradient(0, 0, 0, tipY);
      grad.addColorStop(0, nail.color);
      grad.addColorStop(1, nail.secondColor);
      ctx.fillStyle = grad;
      ctx.fillRect(-hw * 2, tipY - 10, g.w * 4, g.length + 20);
      break;
      
    case 'glitter':
      ctx.fillStyle = nail.color;
      ctx.fillRect(-hw * 2, tipY - 10, g.w * 4, g.length + 20);
      // Glitter particles
      const cxGl = 0, cyGl = tipY + g.length / 2;
      for (let p = 0; p < 60; p++) {
        const px = cxGl + (Math.random() - 0.5) * g.w;
        const py = cyGl + (Math.random() - 0.5) * g.length;
        const pr = Math.random() * 2.5 + 0.5;
        ctx.fillStyle = Math.random() > 0.5 
          ? 'rgba(255,255,255,0.9)' 
          : `rgba(${Math.random()>0.5?255:200},${Math.random()*100+155},${Math.random()*100+155},0.8)`;
        ctx.beginPath();
        ctx.arc(px, py, pr, 0, Math.PI * 2);
        ctx.fill();
      }
      break;
  }
  
  // Decorations
  if (nail.deco !== 'none') {
    const dcx = 0, dcy = tipY + g.length * 0.5;
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = 'rgba(255,255,255,0.8)';
    ctx.lineWidth = 1;
    
    switch (nail.deco) {
      case 'rhinestone':
        const r = g.w * 0.15;
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.beginPath(); ctx.arc(dcx, dcy, r, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = 'rgba(200,200,255,0.8)';
        ctx.stroke();
        // Sparkle
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(dcx - r*0.3, dcy - r*0.3, r*0.3, 0, Math.PI*2); ctx.fill();
        break;
      case 'dots':
        for (let d = 0; d < 5; d++) {
          const dx = dcx + (Math.sin(d * 1.3) * g.w * 0.25);
          const dy = dcy + (d - 2) * g.length * 0.12;
          ctx.fillStyle = nail.secondColor;
          ctx.beginPath(); ctx.arc(dx, dy, g.w * 0.06, 0, Math.PI*2); ctx.fill();
        }
        break;
      case 'heart':
        ctx.fillStyle = nail.secondColor;
        ctx.save();
        ctx.translate(dcx, dcy);
        ctx.scale(g.w * 0.015, g.w * 0.015);
        ctx.beginPath();
        ctx.moveTo(0, -3);
        ctx.bezierCurveTo(-5, -8, -12, -2, 0, 6);
        ctx.bezierCurveTo(12, -2, 5, -8, 0, -3);
        ctx.fill();
        ctx.restore();
        break;
      case 'star':
        ctx.fillStyle = '#ffd43b';
        ctx.save();
        ctx.translate(dcx, dcy);
        ctx.scale(g.w * 0.01, g.w * 0.01);
        ctx.beginPath();
        for (let s = 0; s < 5; s++) {
          const angle = (s * 72 - 90) * Math.PI / 180;
          const outer = 5, inner = 2;
          if (s === 0) ctx.moveTo(Math.cos(angle)*outer, Math.sin(angle)*outer);
          else ctx.lineTo(Math.cos(angle)*outer, Math.sin(angle)*outer);
          const ia = ((s * 72) + 36 - 90) * Math.PI / 180;
          ctx.lineTo(Math.cos(ia)*inner, Math.sin(ia)*inner);
        }
        ctx.closePath();
        ctx.fill();
        ctx.restore();
        break;
      case 'stripe':
        ctx.strokeStyle = nail.secondColor;
        ctx.lineWidth = g.w * 0.06;
        for (let s = -3; s <= 3; s++) {
          ctx.beginPath();
          ctx.moveTo(s * g.w * 0.12, tipY);
          ctx.lineTo(s * g.w * 0.12, 5);
          ctx.stroke();
        }
        break;
    }
  }
  
  // Highlight/shine
  const shineGrad = ctx.createLinearGradient(-hw, tipY, hw * 0.3, 0);
  shineGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
  shineGrad.addColorStop(0.5, 'rgba(255,255,255,0.05)');
  shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = shineGrad;
  ctx.fillRect(-hw * 2, tipY - 10, g.w * 4, g.length + 20);
  
  ctx.restore(); // clip
  
  // Nail outline
  ctx.beginPath();
  ctx.moveTo(-hw, 0);
  ctx.quadraticCurveTo(0, -g.w * 0.12, hw, 0);
  switch (nail.shape) {
    case 'square':
      ctx.lineTo(hw, tipY + 3);
      ctx.lineTo(hw - 1, tipY);
      ctx.lineTo(-hw + 1, tipY);
      ctx.lineTo(-hw, tipY + 3);
      break;
    case 'round':
      ctx.lineTo(hw, tipY + hw * 0.6);
      ctx.quadraticCurveTo(hw, tipY, 0, tipY);
      ctx.quadraticCurveTo(-hw, tipY, -hw, tipY + hw * 0.6);
      break;
    case 'almond':
      ctx.lineTo(hw * 0.7, tipY + g.length * 0.25);
      ctx.quadraticCurveTo(hw * 0.35, tipY + 4, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.35, tipY + 4, -hw * 0.7, tipY + g.length * 0.25);
      break;
    case 'stiletto':
      ctx.lineTo(hw * 0.5, tipY + g.length * 0.4);
      ctx.quadraticCurveTo(hw * 0.15, tipY + 2, 0, tipY);
      ctx.quadraticCurveTo(-hw * 0.15, tipY + 2, -hw * 0.5, tipY + g.length * 0.4);
      break;
    case 'coffin':
      ctx.lineTo(hw * 0.6, tipY + 8);
      ctx.lineTo(hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.4, tipY);
      ctx.lineTo(-hw * 0.6, tipY + 8);
      break;
  }
  ctx.closePath();
  ctx.strokeStyle = idx === selectedNail ? '#c471ed' : 'rgba(255,255,255,0.3)';
  ctx.lineWidth = idx === selectedNail ? 2.5 : 1;
  ctx.stroke();
  
  // Selection glow
  if (idx === selectedNail) {
    ctx.shadowColor = '#c471ed';
    ctx.shadowBlur = 12;
    ctx.strokeStyle = 'rgba(196,113,237,0.6)';
    ctx.lineWidth = 2.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
  }
  
  ctx.restore(); // transform
}

function draw() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.parentElement.getBoundingClientRect();
  const isMobile = rect.width < 500;
  const w = Math.min(700, rect.width - (isMobile ? 16 : 40));
  const h = Math.min(480, w * 0.75);
  
  canvas.width = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  
  // Background
  ctx.fillStyle = '#1a0a1e';
  ctx.fillRect(0, 0, w, h);
  
  const scale = Math.min(w / 700, h / 560);
  const hand = drawHand(scale, w, h);
  
  for (let i = 0; i < 5; i++) {
    drawNail(i, hand, scale);
  }
  
  // Label
  ctx.fillStyle = '#9b7fb5';
  ctx.font = `${12*scale}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.fillText('点击指甲或下方按钮选择 →', hand.cx, hand.cy + 130 * scale);
}

// Event: nail selection from tabs
document.getElementById('nailTabs').addEventListener('click', e => {
  const btn = e.target.closest('.nail-tab');
  if (!btn) return;
  selectedNail = parseInt(btn.dataset.nail);
  document.querySelectorAll('.nail-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  syncControls();
  draw();
});

// Event: shape selection
document.getElementById('shapeGrid').addEventListener('click', e => {
  const btn = e.target.closest('.shape-btn');
  if (!btn) return;
  selectedShape = btn.dataset.shape;
  nails[selectedNail].shape = selectedShape;
  document.querySelectorAll('#shapeGrid .shape-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  draw();
});

// Event: color presets
document.getElementById('colorPresets').addEventListener('click', e => {
  const dot = e.target.closest('.color-dot');
  if (!dot) return;
  selectedColor = dot.dataset.color;
  nails[selectedNail].color = selectedColor;
  document.querySelectorAll('#colorPresets .color-dot').forEach(d => d.classList.remove('active'));
  dot.classList.add('active');
  document.getElementById('customColor').value = selectedColor;
  draw();
});

// Event: custom color
document.getElementById('customColor').addEventListener('input', e => {
  selectedColor = e.target.value;
  nails[selectedNail].color = selectedColor;
  document.querySelectorAll('#colorPresets .color-dot').forEach(d => d.classList.remove('active'));
  draw();
});

// Event: style selection
document.getElementById('styleGrid').addEventListener('click', e => {
  const btn = e.target.closest('.style-btn');
  if (!btn) return;
  selectedStyle = btn.dataset.style;
  nails[selectedNail].style = selectedStyle;
  document.querySelectorAll('#styleGrid .style-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  // Set second color based on style
  if (selectedStyle === 'french') nails[selectedNail].secondColor = '#ffffff';
  else if (selectedStyle === 'ombre') nails[selectedNail].secondColor = '#ffffff';
  else nails[selectedNail].secondColor = '#ffffff';
  
  draw();
});

// Event: decoration selection
document.getElementById('decoGrid').addEventListener('click', e => {
  const btn = e.target.closest('.deco-btn');
  if (!btn) return;
  selectedDeco = btn.dataset.deco;
  nails[selectedNail].deco = selectedDeco;
  document.querySelectorAll('#decoGrid .deco-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  draw();
});

// Canvas click for nail selection
canvas.addEventListener('click', e => {
  handleCanvasTap(e.clientX, e.clientY);
});
canvas.addEventListener('touchend', e => {
  if (e.changedTouches.length === 1) {
    const t = e.changedTouches[0];
    handleCanvasTap(t.clientX, t.clientY);
  }
  e.preventDefault();
});

function handleCanvasTap(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const x = clientX - rect.left;
  const y = clientY - rect.top;
  const panelW = canvas.parentElement.getBoundingClientRect().width;
  const isMobile = panelW < 500;
  const cw = Math.min(700, panelW - (isMobile ? 16 : 40));
  const ch = Math.min(480, cw * 0.75);
  const scale = Math.min(cw / 700, ch / 560);
  const hand = { cx: cw / 2, cy: ch * 0.52 };
  
  let closest = 0, minDist = Infinity;
  for (let i = 0; i < 5; i++) {
    const g = getNailGeom(i, hand, scale);
    const dx = x - g.bx, dy = y - g.by;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < minDist) { minDist = dist; closest = i; }
  }
  
  if (minDist < 150 * scale) {
    selectedNail = closest;
    document.querySelectorAll('.nail-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.nail-tab')[closest].classList.add('active');
    syncControls();
    draw();
  }
});

function syncControls() {
  const nail = nails[selectedNail];
  selectedShape = nail.shape;
  selectedColor = nail.color;
  selectedStyle = nail.style;
  selectedDeco = nail.deco;
  
  document.querySelectorAll('#shapeGrid .shape-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.shape === nail.shape);
  });
  document.querySelectorAll('#colorPresets .color-dot').forEach(d => {
    d.classList.toggle('active', d.dataset.color === nail.color);
  });
  document.getElementById('customColor').value = nail.color;
  document.querySelectorAll('#styleGrid .style-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.style === nail.style);
  });
  document.querySelectorAll('#decoGrid .deco-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.deco === nail.deco);
  });
}

// Copy to all nails
document.getElementById('copyAll').addEventListener('click', () => {
  const src = nails[selectedNail];
  nails.forEach((n, i) => {
    if (i === selectedNail) return;
    n.shape = src.shape;
    n.color = src.color;
    n.style = src.style;
    n.deco = src.deco;
    n.secondColor = src.secondColor;
  });
  draw();
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  nails.forEach((n, i) => {
    n.shape = 'square';
    n.color = '#f7a8d8';
    n.style = 'solid';
    n.deco = i === 3 ? 'rhinestone' : 'none';
    n.secondColor = '#ffffff';
  });
  selectedNail = 0;
  document.querySelectorAll('.nail-tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.nail-tab')[0].classList.add('active');
  syncControls();
  draw();
});

// Save
document.getElementById('saveBtn').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'nail-art-design.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Init
window.addEventListener('resize', draw);
draw();
syncControls();
</script>
</body>
</html>
